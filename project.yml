name: VoiceKit
options:
  bundleIdPrefix: me.ckai
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    OTHER_LDFLAGS: "-framework ApplicationServices"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${VOICEMATE_TEAM_ID}
    PRODUCT_BUNDLE_IDENTIFIER: me.ckai.VoiceMate
    INFOPLIST_FILE: Sources/VoiceKit/Resources/Info.plist
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: false
    Release:
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application: $(VOICEMATE_SIGNING_NAME) ($(VOICEMATE_TEAM_ID))"
      CODE_SIGN_ENTITLEMENTS: Sources/VoiceKit/Resources/VoiceMate.entitlements
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options=runtime"
targets:
  VoiceKit:
    type: application
    platform: macOS
    sources:
      - path: Sources/VoiceKit
    info:
      path: Sources/VoiceKit/Resources/Info.plist
      properties:
        CFBundleName: VoiceKit
        CFBundleDisplayName: VoiceKit
        CFBundleIdentifier: me.ckai.VoiceMate
        CFBundleVersion: "20"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: VoiceKit
        CFBundleIconFile: AppIcon
        NSPrincipalClass: NSApplication
        LSUIElement: false
        NSMicrophoneUsageDescription: "VoiceKit 需要使用麦克风进行语音输入。"
        NSSpeechRecognitionUsageDescription: "VoiceKit 需要使用语音识别将语音实时转为文字。"
        NSHumanReadableCopyright: "Copyright © 2026 VoiceKit. MIT License."
        LSApplicationCategoryType: public.app-category.utilities
